name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install diagnosis app dependencies
        working-directory: diagnosis/kgi
        run: npm install

      - name: Build diagnosis app
        working-directory: diagnosis/kgi
        run: npm run build

      - name: Prepare publish directory
        run: |
          mkdir -p public
          shopt -s dotglob
          for item in *; do
            if [ "$item" != "diagnosis" ] && [ "$item" != ".git" ] && [ "$item" != ".github" ] && [ "$item" != "public" ]; then
              cp -R "$item" public/
            fi
          done
          mkdir -p public/diagnosis/kgi
          cp -R diagnosis/kgi/dist/* public/diagnosis/kgi/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
